<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LACRIME | Unité spécialisée SAST</title>
  <style>
    :root {
      --bg: #07111d;
      --bg-2: #0b1728;
      --panel: rgba(11, 22, 40, 0.82);
      --panel-strong: rgba(10, 18, 33, 0.94);
      --line: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #9bb0cf;
      --blue: #67c8ff;
      --cyan: #7ef7e6;
      --gold: #ffd36e;
      --danger: #ff6b79;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --glow: 0 0 24px rgba(103,200,255,0.18);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(103,200,255,.14), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255,107,121,.08), transparent 18%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    .container {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 1;
      padding: 22px 0 40px;
    }

    .notif-stack {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 50;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 36px));
    }

    .notif {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(7, 14, 26, 0.96);
      border: 1px solid rgba(103,200,255,.22);
      box-shadow: var(--shadow), var(--glow);
      transform: translateX(120%);
      opacity: 0;
      transition: .35s ease;
    }

    .notif.show { transform: translateX(0); opacity: 1; }
    .notif-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--blue);
      margin-bottom: 6px;
      font-weight: 800;
    }
    .notif-text { color: var(--text); font-size: 14px; line-height: 1.55; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(8, 16, 31, 0.7);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .brand {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--blue);
      font-weight: 900;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .nav a, .nav button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      text-decoration: none;
      padding: 11px 15px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: .2s ease;
    }

    .nav a:hover, .nav button:hover,
    .soft-btn:hover, .soft-btn.active,
    .tab:hover, .tab.active {
      border-color: rgba(103,200,255,.32);
      box-shadow: var(--glow);
      transform: translateY(-1px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
      margin-top: 18px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(140deg, rgba(255,255,255,.04), transparent 28%, transparent 70%, rgba(126,247,230,.04));
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(103,200,255,.24);
      background: rgba(103,200,255,.10);
      color: var(--blue);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 900;
      margin-bottom: 14px;
    }

    h1, h2, h3, p { margin-top: 0; }

    .title {
      font-size: clamp(42px, 6vw, 72px);
      line-height: .95;
      margin-bottom: 14px;
      letter-spacing: -.04em;
    }

    .subtitle {
      font-size: 17px;
      line-height: 1.75;
      color: var(--muted);
      max-width: 90%;
      margin-bottom: 18px;
    }

    .headline-stats,
    .mini-grid,
    .objective-grid,
    .stats-grid,
    .feature-grid,
    .report-grid {
      display: grid;
      gap: 14px;
    }

    .headline-stats, .mini-grid { grid-template-columns: repeat(2, 1fr); }
    .objective-grid, .feature-grid, .report-grid { grid-template-columns: repeat(3, 1fr); }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }

    .mini,
    .soft-panel,
    .report-item,
    .feature-item,
    .objective-card,
    .stat-card {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 18px;
      font-weight: 900;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 14px;
      letter-spacing: -.02em;
    }

    .console {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .console-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--blue);
      font-weight: 900;
      margin-bottom: 10px;
    }

      font-family: Consolas, Monaco, monospace;
      font-size:
